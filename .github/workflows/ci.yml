name: Tools App CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Verify build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run comparison tests
        run: npm run test:comparison

      - name: Run price tracker tests
        run: npm run test:price-tracker

      - name: Run template tests
        run: npm run test:templates

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Build Cloudflare Pages output
        run: npm run pages:build
